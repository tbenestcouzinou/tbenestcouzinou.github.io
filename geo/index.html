			</div>

		<!-- Main -->

			<section id="scores">
				<header class="major">

				</header>

		<!-- Scripts -->
		<script src="../assets/js/jquery.min.js"></script>
		<script src="../assets/js/jquery.poptrox.min.js"></script>
		<script src="../assets/js/browser.min.js"></script>
		<script src="../assets/js/breakpoints.min.js"></script>
		<script src="../assets/js/util.js"></script>
		<script src="../assets/js/main.js"></script>
		<script>
		(function () {
			var status = document.getElementById('scores-status');
			var tbody = document.getElementById('scores-body');
			var scoreSources = [
				new URL('../data/scores.json', window.location.href).toString(),
				new URL('/data/scores.json', window.location.origin || window.location.href).toString(),
				'../data/scores.json',
				'/data/scores.json'
			];

			function parseScore(value) {
				if (value === null || value === undefined || value === '') {
					return '—';
				}

				return String(value);
			}

			function parseEntryDate(value) {
				if (!value) {
					return new Date(0);
				}

				var parts = String(value).split('/');

				if (parts.length !== 3) {
					return new Date(value);
				}

				return new Date(parts[2] + '-' + parts[1] + '-' + parts[0]);
			}

			function buildRow(entry) {
				var row = document.createElement('tr');
				var quizCell = document.createElement('td');
				var firstScoreCell = document.createElement('td');
				var secondScoreCell = document.createElement('td');

				quizCell.textContent = entry.quiz || 'Quiz inconnu';
				firstScoreCell.textContent = parseScore(entry.scores && entry.scores['alizouilleam'] && entry.scores['alizouilleam'].score);
				secondScoreCell.textContent = parseScore(entry.scores && entry.scores['Araw Igum'] && entry.scores['Araw Igum'].score);

				row.appendChild(quizCell);
				row.appendChild(firstScoreCell);
				row.appendChild(secondScoreCell);
				return row;
			}

			function showError(message) {
				status.textContent = message;
				tbody.innerHTML = '';
			}

			if (!window.fetch) {
				showError('Le navigateur ne prend pas en charge le chargement automatique des scores.');
				return;
			}

			function fetchFromSources(index) {
				if (index >= scoreSources.length) {
					throw new Error('No score source available');
				}

				var source = scoreSources[index];

				return fetch(source, { cache: 'no-store' })
					.then(function (response) {
						if (!response.ok) {
							throw new Error('HTTP ' + response.status);
						}

						return response.json();
					})
					.then(function (entries) {
						return {
							source: source,
							entries: entries
						};
					})
					.catch(function () {
						return fetchFromSources(index + 1);
					});
			}

			fetchFromSources(0)
				.then(function (entries) {
					var rows = Array.isArray(entries.entries) ? entries.entries.slice() : [];

					rows.sort(function (left, right) {
						return parseEntryDate(right.date) - parseEntryDate(left.date);
					});

					tbody.innerHTML = '';

					rows.forEach(function (entry) {
						tbody.appendChild(buildRow(entry));
					});

					status.textContent = rows.length + ' entrée(s) chargée(s) depuis ' + entries.source + '.';
				})
				.catch(function () {
					showError('Impossible de charger /data/scores.json.');
				});
		})();
		</script>

	</body>
</html>
