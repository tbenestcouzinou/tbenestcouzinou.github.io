name: Daily Scores Update

on:
  schedule:
    - cron: "0 12 * * *"  # tous les jours à 6h UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-scores:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 numpy pandas

      - name: Run scraper
        run: |
          python script/update_score.py

      - name: Commit updated data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data.json
          git commit -m "Update daily scores" || exit 0
          git push