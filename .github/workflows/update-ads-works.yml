name: Update ADS Works

on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-works:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh ADS works
        env:
          ADS_API_TOKEN: ${{ secrets.ADS_API_TOKEN }}
        run: node scripts/update-ads-works.mjs

      - name: Commit updated content
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/ads-works.json
          git commit -m "Update ADS works"
          git push
